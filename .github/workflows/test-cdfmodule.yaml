name: "test-cdfmodule"

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (changed files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Analyze changed PowerShell files
        shell: pwsh
        run: ./tools/Invoke-Lint.ps1 -Changed

  test:
    name: Pester
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser

      - name: Run Pester
        shell: pwsh
        run: ./tools/Invoke-Tests.ps1 -CI

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: ./testResults.xml
